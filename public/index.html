<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspberry Pi Monitor</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div>
    <h1 id="model">Loading...</h1>
    <div class="subtitle"><span id="os">—</span> · Kernel <span id="kernel">—</span> · <span id="uptime">—</span></div>
  </div>
  <div class="actions" id="power-actions" hidden>
    <button class="btn" id="btn-reboot">⟳ Reboot</button>
    <button class="btn btn-danger" id="btn-shutdown">⏻ Shutdown</button>
  </div>
</header>

<main>
  <section class="grid">
    <article class="card"><div class="label">CPU Temperature</div><div class="value" id="temp">—</div><div class="badge" id="throttling">—</div></article>
    <article class="card"><div class="label">CPU Frequency</div><div class="value" id="freq">—</div></article>
    <article class="card"><div class="label">Load Average</div><div class="value small" id="load">—</div></article>
    <article class="card"><div class="label">Available Updates</div><div class="value" id="updates">—</div></article>
    <article class="card"><div class="label">RAM Memory</div><div class="value" id="mem-pct">—</div><div class="bar-bg"><div class="bar" id="mem-bar"></div></div><div class="bar-labels"><span id="mem-used">—</span><span id="mem-total">—</span></div></article>
    <article class="card"><div class="label">Disk</div><div class="value" id="disk-pct">—</div><div class="bar-bg"><div class="bar" id="disk-bar"></div></div><div class="bar-labels"><span id="disk-used">—</span><span id="disk-total">—</span></div></article>
  </section>

  <section class="card">
    <div class="label">Network</div>
    <table>
      <thead><tr><th>Interface</th><th>Received</th><th>Sent</th></tr></thead>
      <tbody id="net-body"></tbody>
    </table>
    <div class="footnote" id="tcp-conn">—</div>
  </section>

  <section class="card">
    <div class="label">Top Processes</div>
    <table>
      <thead><tr><th>User / Command</th><th>CPU</th><th>Mem</th></tr></thead>
      <tbody id="proc-body"></tbody>
    </table>
  </section>
</main>

<dialog id="confirm-dialog">
  <form method="dialog">
    <h2 id="dialog-title">Confirm</h2>
    <p id="dialog-message">Are you sure?</p>
    <menu>
      <button value="cancel" class="btn btn-secondary">Cancel</button>
      <button value="confirm" id="dialog-confirm" class="btn btn-danger">Confirm</button>
    </menu>
  </form>
</dialog>

<script src="/app.js" defer></script>
</body>
</html>
